<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/stylelog.css" />
</head>
<body class="login-page">

  <div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card-panel" style="max-width: 420px; width: 100%;">
      <div class="text-center mb-4">
        <h2 class="page-title mb-1">Sistema de Inventario</h2>
        <p class="page-subtitle mb-0">Acceso al panel administrativo</p>
      </div>

      <form id="formLogin" novalidate>
        <div class="mb-3">
          <label class="form-label-custom">Usuario</label>
          <input type="text" id="loginUsername" class="input-custom" placeholder="Ingresa tu usuario" />
          <div class="field-error" id="err-loginUsername"></div>
        </div>

        <div class="mb-3">
          <label class="form-label-custom">Contraseña</label>
          <input type="password" id="loginPassword" class="input-custom" placeholder="Ingresa tu contraseña" />
          <div class="field-error" id="err-loginPassword"></div>
        </div>

        <button type="submit" class="btn-primary-action w-100" id="btnLogin">
          <span id="btnLoginText"><i class="bi bi-box-arrow-in-right me-1"></i> Entrar</span>
          <span id="btnLoginSpinner" class="d-none"><div class="spinner-sm"></div></span>
        </button>
      </form>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
