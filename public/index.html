<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de Herramientas</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════════
       SIDEBAR  (estructura fija, nunca cambia)
  ══════════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon"><i class="bi bi-box-seam-fill"></i></div>
    <div>
      <div class="brand-name">StockPro</div>
      <div class="brand-sub">Panel de gestión</div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section-label">Principal</div>
    <a href="#" class="nav-item active" data-page="dashboard">
      <i class="bi bi-grid-1x2-fill"></i>
      <span>Dashboard</span>
    </a>

    <div class="nav-section-label">Inventario</div>
    <a href="#" class="nav-item" data-page="herramientas">
      <i class="bi bi-tools"></i>
      <span>Herramientas</span>
    </a>

    <a href="#" class="nav-item" data-page="productos">
      <i class="bi bi-box-seam"></i>
      <span>Productos</span>
    </a>

    <div class="nav-section-label">Operaciones</div>
    <a href="#" class="nav-item" data-page="prestamos">
      <i class="bi bi-arrow-left-right"></i>
      <span>Préstamos</span>
    </a>

    <a href="#" class="nav-item" data-page="compras">
      <i class="bi bi-receipt"></i>
      <span>Compras</span>
    </a>

    <div class="nav-section-label">Personas</div>
    <a href="#" class="nav-item" data-page="personal">
      <i class="bi bi-people"></i>
      <span>Personal</span>
    </a>

    <a href="#" class="nav-item" data-page="proveedores">
      <i class="bi bi-truck"></i>
      <span>Proveedores</span>
    </a>

    <div class="nav-section-label">Configuración</div>
    <a href="#" class="nav-item" data-page="categorias">
      <i class="bi bi-tags"></i>
      <span>Categorías</span>
    </a>

    <a href="#" class="nav-item" data-page="marcas">
      <i class="bi bi-bookmark-star"></i>
      <span>Marcas</span>
    </a>

    <a href="#" class="nav-item" data-page="ubicaciones">
      <i class="bi bi-geo-alt"></i>
      <span>Ubicaciones</span>
    </a>

    <a href="#" class="nav-item" data-page="areas">
      <i class="bi bi-diagram-3"></i>
      <span>Áreas</span>
    </a>

    <a href="#" class="nav-item" data-page="roles">
      <i class="bi bi-person-badge"></i>
      <span>Roles</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="d-flex align-items-center gap-2">
      <div class="avatar-xs"><i class="bi bi-person-fill"></i></div>
      <div>
        <div class="fw-600 text-sm">Administrador</div>
        <div class="text-muted" style="font-size:11px">Sistema v1.0</div>
      </div>
    </div>
  </div>
</aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ══════════════════════════════════════════
       MAIN CONTENT
  ══════════════════════════════════════════ -->
  <main class="main-content" id="mainContent">

    <header class="topbar">
      <button class="btn-toggle-sidebar" id="btnToggleSidebar">
        <i class="bi bi-list"></i>
      </button>
      <div class="topbar-title" id="topbarTitle">Dashboard</div>
      <div class="topbar-actions">
        <div class="status-dot"></div>
        <span class="text-sm text-muted">Conectado</span>
      </div>
    </header>

    <!-- ════════════════════════════════════════
         CONTENEDOR DINÁMICO
         El router inyecta aquí el HTML de cada vista
    ════════════════════════════════════════ -->
    <div class="page-wrapper" id="pageContainer">
      <div class="d-flex justify-content-center align-items-center" style="height:60vh">
        <div class="spinner-custom"></div>
      </div>
    </div>

  </main>

  <!-- ══════════════════════════════════════════
       MODALES GLOBALES (compartidos entre módulos)
  ══════════════════════════════════════════ -->
  <div id="modalsContainer"></div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Librerias externas -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Orden de carga: utilidades → router → módulos → arranque -->
 <script src="js/utils.js"></script>
<script src="js/catalogoBase.js"></script>

<script src="js/modules/dashboard.js"></script>
<script src="js/modules/herramientas.js"></script>
<script src="js/modules/prestamos.js"></script>
<script src="js/modules/personal.js"></script>
<script src="js/modules/proveedores.js"></script>
<script src="js/modules/productos.js"></script>
<script src="js/modules/compras.js"></script>

<script src="js/modules/categorias.js"></script>
<script src="js/modules/marcas.js"></script>
<script src="js/modules/ubicaciones.js"></script>
<script src="js/modules/areas.js"></script>
<script src="js/modules/roles.js"></script>

<script src="js/router.js"></script>
<script src="js/app.js"></script>
</body>
</html>
