<div class="page-header">
  <div>
    <h1 class="page-title">Personal</h1>
    <p class="page-subtitle">Gestión de empleados habilitados para préstamos</p>
  </div>

  <button class="btn-primary-action" id="btnNuevoPersonal">
    <i class="bi bi-plus-lg"></i> Nuevo Personal
  </button>
</div>

<div class="search-bar-row">
  <div class="search-input-wrap">
    <i class="bi bi-search search-icon"></i>
    <input
      type="text"
      id="searchPersonal"
      class="search-input"
      placeholder="Buscar por DNI, nombre, área o estado…"
    />
  </div>

  <button class="btn-icon-outline" id="btnRefreshPersonal" title="Recargar">
    <i class="bi bi-arrow-clockwise"></i>
  </button>
</div>

<div class="card-panel">
  <div class="table-responsive">
    <table class="table-custom">
      <thead>
        <tr>
          <th>#</th>
          <th>DNI</th>
          <th>Empleado</th>
          <th>Área</th>
          <th>Contacto</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody id="bodyPersonal">
        <tr>
          <td colspan="7" class="text-center py-5">
            <div class="spinner-custom"></div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="table-footer">
    <span class="text-muted text-sm" id="totalPersonalLabel"> Cargando… </span>
  </div>
</div>

<!-- modal para agregar personal -->
<div class="modal-overlay" id="modalPersonalOverlay">
  <div class="modal-panel">
    <div class="modal-header-custom">
      <div>
        <div class="modal-title-custom" id="modalPersonalTitle">
          Nuevo Personal
        </div>
        <div class="modal-subtitle" id="modalPersonalSubtitle">
          Completa los datos del empleado
        </div>
      </div>

      <button class="btn-modal-close" id="btnCloseModalPersonal">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="modal-body-custom">
      <form id="formPersonal" novalidate>
        <input type="hidden" id="personalId" />

        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label-custom">
              DNI <span class="required">*</span>
            </label>
            <input
              type="text"
              id="pDni"
              class="input-custom"
              placeholder="Ej: 74859612"
              maxlength="20"
            />
            <div class="field-error" id="err-pDni"></div>
          </div>

          <div class="col-md-6">
            <label class="form-label-custom">Teléfono</label>
            <input
              type="text"
              id="pTelefono"
              class="input-custom"
              placeholder="Ej: 987654321"
            />
          </div>

          <div class="col-12">
            <label class="form-label-custom">
              Nombres y apellidos <span class="required">*</span>
            </label>
            <input
              type="text"
              id="pNombres"
              class="input-custom"
              placeholder="Ej: Juan Pérez"
            />
            <div class="field-error" id="err-pNombres"></div>
          </div>

          <div class="col-12">
            <label class="form-label-custom">Dirección</label>
            <input
              type="text"
              id="pDireccion"
              class="input-custom"
              placeholder="Ej: Av. Lima 123"
            />
          </div>

          <div class="col-md-6">
            <label class="form-label-custom">
              Área <span class="required">*</span>
            </label>
            <select id="pArea" class="input-custom">
              <option value="">— Seleccionar área —</option>
            </select>
            <div class="field-error" id="err-pArea"></div>
          </div>

          <div class="col-md-6">
            <label class="form-label-custom">Estado</label>
            <select id="pEstado" class="input-custom">
              <option value="ACTIVO">ACTIVO</option>
              <option value="INACTIVO">INACTIVO</option>
            </select>
          </div>
        </div>
      </form>
    </div>

    <div class="modal-footer-custom">
      <button class="btn-cancel" id="btnCancelPersonal">Cancelar</button>

      <button class="btn-save" id="btnSavePersonal">
        <span id="btnSavePersonalText">
          <i class="bi bi-check-lg me-1"></i> Guardar
        </span>
        <span id="btnSavePersonalSpinner" class="d-none">
          <div class="spinner-sm"></div>
        </span>
      </button>
    </div>
  </div>
</div>
