<div class="page-header">
  <div>
    <h1 class="page-title">Herramientas</h1>
    <p class="page-subtitle">Gestión de herramientas físicas del inventario</p>
  </div>
  <button class="btn-primary-action" id="btnNuevaHerramienta">
    <i class="bi bi-plus-lg"></i> Nueva Herramienta
  </button>
</div>

<div class="search-bar-row">
  <div class="search-input-wrap">
    <i class="bi bi-search search-icon"></i>
    <input
      type="text"
      id="searchHerramienta"
      class="search-input"
      placeholder="Buscar por código, producto, marca, serie o estado…"
    />
  </div>

  <button class="btn-icon-outline" id="btnRefreshHerramientas" title="Recargar">
    <i class="bi bi-arrow-clockwise"></i>
  </button>
</div>

<div class="card-panel">
  <div class="table-responsive">
    <table class="table-custom">
      <thead>
        <tr>
          <th>#</th>
          <th>Código</th>
          <th>Producto</th>
          <th>Estado</th>
          <th>Ubicación</th>
          <th>Disponibilidad</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="bodyHerramientas">
        <tr>
          <td colspan="7" class="text-center py-5">
            <div class="spinner-custom"></div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="modal-overlay" id="modalHerramientaOverlay">
    <div class="modal-panel">
      <div class="modal-header-custom">
        <div>
          <div class="modal-title-custom" id="modalHerramientaTitle">
            Nueva Herramienta
          </div>
          <div class="modal-subtitle" id="modalHerramientaSubtitle">
            Completa los campos
          </div>
        </div>
        <button class="btn-modal-close" id="btnCloseModalHerramienta">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>

      <div class="modal-body-custom">
        <form id="formHerramienta" novalidate>
          <input type="hidden" id="herramientaId" />

          <div class="row g-3">
            <!-- CODIGO -->
            <div class="col-12">
              <label class="form-label-custom">Código *</label>
              <input type="text" id="hCodigo" class="input-custom" required />
            </div>

            <!-- SERIE -->
            <div class="col-12">
              <label class="form-label-custom">Serie</label>
              <input type="text" id="hSerie" class="input-custom" />
            </div>

            <!-- PRODUCTO (DINÁMICO) -->
            <div class="col-12" id="wrapProductoSelect">
              <label class="form-label-custom">Producto *</label>
              <select id="hProducto" class="input-custom"></select>
            </div>

            <!-- PRODUCTO SOLO LECTURA -->
            <div class="col-12 d-none" id="wrapProductoText">
              <label class="form-label-custom">Producto</label>
              <input
                type="text"
                id="hProductoText"
                class="input-custom"
                disabled
              />
            </div>

            <!-- ESTADO -->
            <div class="col-md-6">
              <label class="form-label-custom">Estado</label>
              <select id="hEstado" class="input-custom">
                <option value="BUENO">BUENO</option>
                <option value="REGULAR">REGULAR</option>
                <option value="MALO">MALO</option>
              </select>
            </div>

            <!-- UBICACION -->
            <div class="col-md-6">
              <label class="form-label-custom">Ubicación</label>
              <select id="hUbicacion" class="input-custom"></select>
            </div>
          </div>
        </form>
      </div>

      <div class="modal-footer-custom">
        <button class="btn-cancel" id="btnCancelHerramienta">Cancelar</button>
        <button class="btn-save" id="btnSaveHerramienta">Guardar</button>
      </div>
    </div>
  </div>

  <div class="table-footer">
    <span class="text-muted text-sm" id="totalHerramientasLabel"
      >Cargando…</span
    >
  </div>
</div>

<!-- Modal prestamo rapido -->
<div class="modal-overlay" id="modalPrestamoRapido">
  <div class="modal-panel modal-sm">
    <div class="modal-header-custom">
      <div>
        <div class="modal-title-custom">Préstamo Rápido</div>
        <div class="modal-subtitle">Asignar herramienta rápidamente</div>
      </div>
      <button class="btn-modal-close" id="btnClosePrestamoRapido">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="modal-body-custom">
      <div class="mb-3">
        <label class="form-label-custom">Herramienta</label>
        <div
          class="input-custom"
          id="infoHerramienta"
          style="background: #f5f5f5"
        ></div>
      </div>

      <div class="mb-3">
        <label class="form-label-custom"
          >Persona <span class="required">*</span></label
        >
        <select id="rpPersona" class="input-custom"></select>
      </div>

      <div class="mb-3">
        <label class="form-label-custom">Motivo</label>
        <input
          type="text"
          id="rpMotivo"
          class="input-custom"
          placeholder="Ej: Trabajo en obra"
        />
      </div>

      <div class="mb-3">
        <label class="form-label-custom"
          >Fecha límite <span class="required">*</span></label
        >
        <input type="date" id="rpFechaLimite" class="input-custom" />
      </div>
    </div>

    <div class="modal-footer-custom">
      <button class="btn-cancel" id="btnCancelPrestamoRapido">Cancelar</button>

      <button class="btn-save" id="btnSavePrestamoRapido">
        <span id="btnSavePrestamoRapidoText">
          <i class="bi bi-check-lg me-1"></i> Registrar
        </span>
      </button>
    </div>
  </div>
</div>
