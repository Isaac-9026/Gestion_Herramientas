<div class="page-header">
  <div>
    <h1 class="page-title">Préstamos</h1>
    <p class="page-subtitle">Gestión de préstamos de herramientas</p>
  </div>

  <button class="btn-primary-action" id="btnNuevoPrestamo">
    <i class="bi bi-plus-lg"></i> Nuevo Préstamo
  </button>
</div>

<div class="search-bar-row">
  <div class="search-input-wrap">
    <i class="bi bi-search search-icon"></i>
    <input
      type="text"
      id="searchPrestamo"
      class="search-input"
      placeholder="Buscar por persona, usuario o estado…"
    />
  </div>

  <button class="btn-icon-outline" id="btnRefreshPrestamos" title="Recargar">
    <i class="bi bi-arrow-clockwise"></i>
  </button>
</div>

<div class="card-panel">
  <div class="table-responsive">
    <table class="table-custom">
      <thead>
        <tr>
          <th>#</th>
          <th>Persona</th>
          <th>Usuario</th>
          <th>Ítems</th>
          <th>Fecha</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody id="bodyPrestamos">
        <tr>
          <td colspan="7" class="text-center py-5">
            <div class="spinner-custom"></div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="table-footer">
    <span class="text-muted text-sm" id="totalPrestamosLabel">Cargando…</span>
  </div>
</div>

<!-- MODAL DETALLE PRÉSTAMO -->
<div class="modal-overlay" id="modalDetallePrestamo">
  <div class="modal-panel">

    <div class="modal-header-custom">
      <div>
        <div class="modal-title-custom">Detalle del Préstamo</div>
        <div class="modal-subtitle" id="detalleInfo"></div>
      </div>

      <button class="btn-modal-close" id="btnCloseDetallePrestamo">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="modal-body-custom">

      <div class="table-responsive">
        <table class="table-custom">
          <thead>
            <tr>
              <th>Código</th>
              <th>Producto</th>
              <th>Entrega</th>
              <th>Estado</th>
              <th>Fecha Dev.</th>
              <th>Obs.</th>
              <th>Acción</th>
            </tr>
          </thead>

          <tbody id="bodyDetallePrestamo">
            <tr>
              <td colspan="7" class="text-center py-4">
                <div class="spinner-custom"></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>

    <div class="modal-footer-custom">
      <button class="btn-cancel" id="btnCloseDetallePrestamoFooter">
        Cerrar
      </button>
    </div>

  </div>
</div>
