<div class="page-header">
  <h1 class="page-title">Dashboard</h1>
  <p class="page-subtitle">Resumen general del inventario</p>
</div>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-icon" style="--c:#6366f1"><i class="bi bi-box-seam-fill"></i></div>
    <div class="stat-value" id="stat-total-productos">—</div>
    <div class="stat-label">Productos</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon" style="--c:#f59e0b"><i class="bi bi-bookmark-star-fill"></i></div>
    <div class="stat-value" id="stat-total-marcas">—</div>
    <div class="stat-label">Marcas</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon" style="--c:#10b981"><i class="bi bi-currency-dollar"></i></div>
    <div class="stat-value" id="stat-valor-total">—</div>
    <div class="stat-label">Valor Total</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon" style="--c:#ec4899"><i class="bi bi-graph-up-arrow"></i></div>
    <div class="stat-value" id="stat-precio-promedio">—</div>
    <div class="stat-label">Precio Promedio</div>
  </div>
</div>

<div class="row g-4 mt-1">
  <div class="col-lg-7">
    <div class="card-panel">
      <div class="panel-header">
        <span class="panel-title"><i class="bi bi-clock-history me-2"></i>Últimos Productos</span>
        <a href="#" class="btn-link" data-page="productos">Ver todos</a>
      </div>
      <div id="tabla-recientes"></div>
    </div>
  </div>
  <div class="col-lg-5">
    <div class="card-panel">
      <div class="panel-header">
        <span class="panel-title"><i class="bi bi-bar-chart-fill me-2"></i>Productos por Marca</span>
      </div>
      <div id="chart-marcas"></div>
    </div>
  </div>
</div>
