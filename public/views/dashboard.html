<div class="page-header">
  <div>
    <h1 class="page-title">Dashboard</h1>
    <p class="page-subtitle">Resumen operativo del herramientas y préstamos</p>
  </div>
</div>

<div id="dashboardAlertWrap"></div>

<div class="row g-4 mt-1">
  <div class="col-lg-7">
    <div class="card-panel">
      <div class="panel-header">
        <span class="panel-title">
          <i class="bi bi-clock-history me-2"></i>Últimos préstamos
        </span>
        <a href="#" class="btn-link" id="linkVerPrestamos">Ver todos</a>
      </div>

      <div class="table-responsive">
        <table class="table-custom">
          <thead>
            <tr>
              <th>Persona</th>
              <th>Ítems</th>
              <th>Fecha</th>
              <th>Límite</th>
              <th>Cierre</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody id="tablaPrestamosRecientes">
            <tr>
              <td colspan="6" class="text-center py-5">
                <div class="spinner-custom"></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="col-lg-5">
    <div class="card-panel">
      <div class="panel-header">
        <span class="panel-title">
          <i class="bi bi-pie-chart-fill me-2"></i>Estado de herramientas
        </span>
      </div>
      <div style="height: 260px">
        <canvas id="chartHerramientas"></canvas>
      </div>
    </div>

    <div class="card-panel mt-4">
      <div class="panel-header">
        <span class="panel-title">
          <i class="bi bi-bar-chart-fill me-2"></i>Préstamos
        </span>
      </div>
      <div style="height: 260px">
        <canvas id="chartPrestamos"></canvas>
      </div>
    </div>
  </div>
</div>
