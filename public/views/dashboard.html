<div class="page-header">
  <div>
    <h1 class="page-title">Dashboard</h1>
    <p class="page-subtitle">Resumen operativo del inventario y préstamos</p>
  </div>
</div>

<div id="dashboardAlertWrap"></div>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-icon" style="--c: #6366f1">
      <i class="bi bi-tools"></i>
    </div>
    <div class="stat-value" id="stat-total-herramientas">—</div>
    <div class="stat-label">Herramientas</div>
  </div>

  <div class="stat-card">
    <div class="stat-icon" style="--c: #10b981">
      <i class="bi bi-check-circle-fill"></i>
    </div>
    <div class="stat-value" id="stat-herramientas-disponibles">—</div>
    <div class="stat-label">Disponibles</div>
  </div>

  <div class="stat-card">
    <div class="stat-icon" style="--c: #f59e0b">
      <i class="bi bi-arrow-return-left"></i>
    </div>
    <div class="stat-value" id="stat-herramientas-prestadas">—</div>
    <div class="stat-label">Prestadas</div>
  </div>

  <div class="stat-card">
    <div class="stat-icon" style="--c: #ef4444">
      <i class="bi bi-exclamation-triangle-fill"></i>
    </div>
    <div class="stat-value" id="stat-herramientas-malo">—</div>
    <div class="stat-label">En mal estado</div>
  </div>

  <div class="stat-card">
    <div class="stat-icon" style="--c: #06b6d4">
      <i class="bi bi-journal-check"></i>
    </div>
    <div class="stat-value" id="stat-prestamos-activos">—</div>
    <div class="stat-label">Préstamos activos</div>
  </div>

  <div class="stat-card">
    <div class="stat-icon" style="--c: #dc2626">
      <i class="bi bi-clock-history"></i>
    </div>
    <div class="stat-value" id="stat-prestamos-atrasados">—</div>
    <div class="stat-label">Atrasados</div>
  </div>
</div>

<div class="row g-4 mt-1">
  <div class="col-lg-7">
    <div class="card-panel">
      <div class="panel-header">
        <span class="panel-title">
          <i class="bi bi-clock-history me-2"></i>Últimos préstamos
        </span>
        <a href="#" class="btn-link" id="linkVerPrestamos">Ver todos</a>
      </div>

      <div class="table-responsive">
        <table class="table-custom">
          <thead>
            <tr>
              <th>Persona</th>
              <th>Ítems</th>
              <th>Fecha</th>
              <th>Límite</th>
              <th>Cierre</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody id="tablaPrestamosRecientes">
            <tr>
              <td colspan="6" class="text-center py-5">
                <div class="spinner-custom"></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="col-lg-5">
    <div class="card-panel">
      <div class="panel-header">
        <span class="panel-title">
          <i class="bi bi-pie-chart-fill me-2"></i>Disponibilidad de
          herramientas
        </span>
      </div>

      <div class="d-flex flex-column align-items-center gap-3 py-3">
        <div id="chartHerramientasDonut"></div>
        <div class="w-100" id="legendHerramientas"></div>
      </div>
    </div>

    <div class="card-panel mt-4">
      <div class="panel-header">
        <span class="panel-title">
          <i class="bi bi-diagram-3-fill me-2"></i>Catálogos base
        </span>
      </div>
      <div id="catalogosBase"></div>
    </div>
  </div>
</div>
